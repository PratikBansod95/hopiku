<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="ad.orientation" content="portrait" />
    <title>Hopiku</title>
    <!-- YouTube Playables SDK — must load before game code -->
    <script src="https://www.youtube.com/game_api/v1"></script>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div id="loading-screen">
        <p class="loading-text">Loading...</p>
      </div>

      <div id="startScreen" class="hidden">
        <button id="btn-settings" class="icon-btn top-left" type="button" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/></svg>
        </button>
        <div class="start-header">
          <h1 class="title">
            <img
              class="title-img"
              src="./assets/images/title-hopiku.png"
              alt="Hopiku"
              width="420"
              height="160"
              decoding="async"
            />
          </h1>
          <p class="tagline">Hop Higher. Dream Bigger.</p>
        </div>
        <p class="instruction" aria-hidden="true">
          <img
            class="cta-img"
            src="./assets/images/cta-tap-to-jump.png"
            alt=""
            width="340"
            height="72"
            decoding="async"
          />
        </p>
      </div>

      <div id="hud" class="hidden">
        <button id="btn-pause" class="icon-btn top-left" type="button" aria-label="Pause">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>
        </button>
        <div id="scoreContainer">
          <span id="scoreDisplay" class="score-display">0</span>
          <span id="bestHud" class="best-hud">BEST 0</span>
        </div>
        <div id="zoneBadge" class="zone-badge">
          <span id="zoneName">Bamboo Grove</span>
          <span id="logsCount">0 logs</span>
        </div>
      </div>

      <div id="pause-screen" class="hidden overlay">
        <p class="overlay-title">Paused</p>
        <button id="btn-resume" class="action-btn" type="button">Resume</button>
        <button id="btn-home-pause" class="action-btn secondary" type="button">Home</button>
      </div>

      <div id="game-over-screen" class="hidden">
        <div id="anim-box" class="stamp-anim">
          <p id="taunt-title" class="taunt-title">BAMBOO BLUNDER</p>
          <div class="score-board">
            <p class="score-label">Score</p>
            <p id="final-score" class="score-final">0</p>
            <p id="best-score" class="best-score hidden">BEST — 0</p>
          </div>
          <p id="taunt-sub" class="taunt-sub">Oops! Even pandas have off days!</p>
          <p id="taunt-restart" class="taunt-restart">Tap to Play Again</p>
          <div class="game-over-actions">
            <button id="btn-home" class="round-btn home" type="button" aria-label="Home">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
            </button>
            <button id="btn-restart" class="round-btn restart" type="button" aria-label="Restart">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 14c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 10.74A7.93 7.93 0 0 0 4 14c0 4.42 3.58 8 8 8v3l5-5-5-5v3z"/></svg>
            </button>
            <button id="btn-share" class="round-btn share" type="button" aria-label="Share">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
