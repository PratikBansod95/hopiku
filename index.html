<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="ad.orientation" content="portrait" />
    <title>Hopiku</title>
    <!-- YouTube Playables SDK — must load before game code -->
    <script src="https://www.youtube.com/game_api/v1"></script>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div id="loading-screen">
        <p class="loading-text">Loading...</p>
      </div>

      <div id="startScreen" class="hidden">
        <button id="btn-sound-home" class="icon-btn top-left" type="button" aria-label="Mute sound" aria-pressed="true">
          <svg class="sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
          <svg class="sound-off hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M3.63 3.63a.996.996 0 0 0 0 1.41L7.29 8.7 3 10v4h4l5 5v-6.59l4.18 4.18c-.19.07-.39.11-.59.11-.55 0-1-.45-1-1V9.41L3.63 3.63zM14 3.23v2.06c2.89.86 5 3.54 5 6.71 0 1.79-.68 3.42-1.79 4.66l1.42 1.42A8.954 8.954 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77z"/></svg>
        </button>
        <div class="start-header">
          <h1 class="title">
            <img
              class="title-img"
              src="./assets/images/title-hopiku.png"
              alt="Hopiku"
              width="420"
              height="160"
              decoding="async"
            />
          </h1>
          <p class="tagline">Hop Higher. Dream Bigger.</p>
        </div>
        <p class="instruction" aria-hidden="true">
          <img
            class="cta-img"
            src="./assets/images/cta-tap-to-jump.png"
            alt=""
            width="340"
            height="72"
            decoding="async"
          />
        </p>
      </div>

      <div id="hud" class="hidden">
        <button id="btn-pause" class="icon-btn top-left" type="button" aria-label="Pause">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>
        </button>
        <div id="scoreContainer">
          <span id="scoreDisplay" class="score-display">0</span>
          <span id="bestHud" class="best-hud">BEST 0</span>
        </div>
        <div id="zoneBadge" class="zone-badge">
          <span id="zoneName">Bamboo Grove</span>
          <span id="logsCount">0 logs</span>
        </div>
      </div>

      <div id="pause-screen" class="hidden overlay">
        <p class="overlay-title">Paused</p>
        <button id="btn-resume" class="action-btn" type="button">Resume</button>
        <button id="btn-home-pause" class="action-btn secondary" type="button">Home</button>
      </div>

      <div id="game-over-screen" class="hidden">
        <div id="anim-box" class="game-over-card stamp-anim">
          <div class="go-hero">
            <img
              class="go-panda-peek go-panda-ui"
              alt=""
              width="120"
              height="80"
              decoding="async"
            />
            <div class="go-title-plank">
              <h2 id="taunt-title" class="go-title-text">BAMBOO BLUNDER</h2>
            </div>
          </div>

          <div class="score-board go-panel">
            <div class="go-panel-inner">
              <span class="score-label go-score-label">Score</span>
              <p id="final-score" class="score-final go-score-num">0</p>
              <p id="best-score" class="best-score go-best hidden">
                <span class="go-crown" aria-hidden="true">👑</span>
                <span class="go-best-text">BEST — 0</span>
              </p>
              <div class="go-taunt-row">
                <span class="go-sad-badge" aria-hidden="true">🐼</span>
                <p id="taunt-sub" class="taunt-sub go-taunt-sub">Oops! Even pandas have off days!</p>
              </div>
            </div>
          </div>

          <button id="btn-play-again" class="go-play-again" type="button">
            <span class="go-play-again-btn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 14c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 10.74A7.93 7.93 0 0 0 4 14c0 4.42 3.58 8 8 8v3l5-5-5-5v3z"/>
              </svg>
              Tap to Play Again
            </span>
          </button>

          <div class="game-over-actions go-actions">
            <div class="go-action">
              <button id="btn-home" class="round-btn home" type="button" aria-label="Home">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
              </button>
              <span class="go-action-label">Home</span>
            </div>
            <div class="go-action">
              <button id="btn-sound" class="round-btn sound" type="button" aria-label="Mute sound" aria-pressed="true">
                <svg class="sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
                <svg class="sound-off hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M3.63 3.63a.996.996 0 0 0 0 1.41L7.29 8.7 3 10v4h4l5 5v-6.59l4.18 4.18c-.19.07-.39.11-.59.11-.55 0-1-.45-1-1V9.41L3.63 3.63zM14 3.23v2.06c2.89.86 5 3.54 5 6.71 0 1.79-.68 3.42-1.79 4.66l1.42 1.42A8.954 8.954 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77z"/></svg>
              </button>
              <span class="go-action-label">Sound</span>
            </div>
            <div class="go-action">
              <button id="btn-share" class="round-btn share" type="button" aria-label="Share">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
              </button>
              <span class="go-action-label">Share</span>
            </div>
          </div>
        </div>
      </div>

      <p class="watermark">By: Pratik</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
